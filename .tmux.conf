# ==========================================
# 1. CORE SETTINGS
# ==========================================
set-option -g default-shell /usr/bin/nu
unbind r
bind r source-file ~/.tmux.conf
set -g prefix C-Space
set -g allow-passthrough on
set -g visual-activity off
set -g status-position top        # As per user config
set -s escape-time 0
set -g history-limit 50000
set -g display-time 500
set -g status-interval 5          # optimized for battery/cpu updates
set -g base-index 1
setw -g mode-keys vi
# ==========================================
# 2. PLUGIN MANAGEMENT (TPM)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Hardware Monitoring Plugins (Required for Status Right)
set -g @plugin 'omerxx/catppuccin-tmux' # My fork that holds the meetings script bc I'm lazy af
set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @catppuccin_menu_selected_style "fg=#{@thm_surface_0},bg=terminal"
# set -g @catppuccin_window_left_separator ""
# set -g @catppuccin_window_right_separator ""
# set -g @catppuccin_window_middle_separator "█"
# set -g @catppuccin_window_number_position "right"
# set -g @catppuccin_window_default_fill "number"
# set -g @catppuccin_window_default_text "#W "
# set -g @catppuccin_window_current_fill "number"
# set -g @catppuccin_window_current_text "#W #{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "battery" # date_time"
# set -g @catppuccin_status_modules_left "session"
# set -g @catppuccin_status_left_separator  ""
# set -g @catppuccin_status_right_separator ""
# set -g @catppuccin_status_right_separator_inverse "no"
# set -g @catppuccin_status_fill "all"
# set -g @catppuccin_status_connect_separator "no"
# set -g @catppuccin_directory_text "#{b:pane_current_path}"
# Use the dynamic icon from tmux-battery in the icon part
run '~/.tmux/plugins/tpm/tpm'

set -g status-bg terminal
set -g status-style bg=terminal
set -g window-status-separator "#[bg=terminal] "
# Inactive windows: gray pill with blue number
set -g window-status-format "#[fg=#313244,bg=terminal]#[fg=#cdd6f4,bg=#313244]#W #[fg=#89b4fa,bg=#313244]█#[fg=#313244,bg=#89b4fa]#I#[fg=#89b4fa,bg=terminal]"
# Active window: text with orange number pill
set -g window-status-current-format "#[fg=#313244,bg=terminal]#[fg=#cdd6f4,bg=#313244]#W #{?window_zoomed_flag,(),}#[fg=#fab387,bg=#313244]█#[fg=#313244,bg=#fab387]#I#[fg=#fab387,bg=terminal]"
set -g status-right "#[fg=#f9e2af,bg=terminal,nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#f9e2af,nobold,nounderscore,noitalics]#(/home/rafail/.tmux/plugins/tmux-battery/scripts/battery_icon.sh) #[fg=#1e1e2e,bg=#f9e2af]#(/home/rafail/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh)#[fg=#f9e2af,bg=terminal,nobold,nounderscore,noitalics]"
set -g status-left "#[fg=#{?client_prefix,#f38ba8,#a6e3a1},bg=terminal,nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#{?client_prefix,#f38ba8,#a6e3a1},nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#{?client_prefix,#f38ba8,#a6e3a1}] #S#[fg=#{?client_prefix,#f38ba8,#a6e3a1},bg=terminal,nobold,nounderscore,noitalics]#[bg=terminal] "
