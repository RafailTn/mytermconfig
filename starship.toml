[username]
show_always = true
style_user = "bg:second fg:white"
style_root = "bg:second fg:white"
format = '[$user]($style)[î‚°](fg:second bg:third)'

[directory]
style = "bg:third fg:white"
format = "[ ïپ¼  $path ]($style)($style)[$read_only]($read_only_style)[î‚°](fg:third bg:fourth)"
truncation_symbol = "â€¦/"
